services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elegant
      POSTGRES_PASSWORD: elegant
      POSTGRES_DB: elegant_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elegant -d elegant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://elegant:elegant@postgres:5432/elegant_db
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      PYTHON_ENGINE_URL: http://python-engine:8001
    depends_on:
      postgres:
        condition: service_healthy
      python-engine:
        condition: service_started
    volumes:
      - ./backend/public:/app/public

  python-engine:
    build:
      context: .
      dockerfile: python-engine/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://elegant:elegant@postgres:5432/elegant_db
      AUTO_REFRESH: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./python-engine/data:/workspace/python-engine/data
      - ./backend/public/polyvore-images:/workspace/backend/public/polyvore-images
      - ./shared:/workspace/shared

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
